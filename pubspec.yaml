name: gram_yatra
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  google_generative_ai: ^0.4.0
  flutter_dotenv: ^5.1.0
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  http: ^1.6.0
  sqflite: ^2.3.0
  path: ^1.9.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.5.5
  geolocator: ^14.0.2
  webview_flutter: ^4.13.1
  google_maps_flutter: ^2.16.0
  connectivity_plus: ^7.0.0
  flutter_tts: any
  cloud_functions: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/data/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"